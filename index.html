    <!-- Configuration -->
    <script>

    <style>
        /* Aurora Background Effect */
        .aurora-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background-color: #FAFAF8;
            overflow: hidden;
        }
        .aurora-bg::before, .aurora-bg::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.4;
            animation: float 20s infinite ease-in-out alternate;
        }
        .aurora-bg::before {
            top: -10%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(30,58,95,0.12) 0%, rgba(250,250,248,0) 70%);
        }
        .aurora-bg::after {
            bottom: -10%;
            right: -10%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(74,144,217,0.10) 0%, rgba(250,250,248,0) 70%);
            animation-delay: -10s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(5%, 5%) scale(1.1); }
        }

        /* Glassmorphism Utilities */
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.04);
        }

        /* Text Gradients */
        .text-gradient {
            background: linear-gradient(135deg, #1E3A5F 0%, #4A90D9 50%, #1E3A5F 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Service Card */
        .service-card {
            transition: transform .4s ease, box-shadow .4s ease;
        }
        .service-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 24px 60px rgba(0,0,0,0.08);
        }
    </style>
</head>
